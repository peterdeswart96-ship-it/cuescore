name: Cuescore Speler Notifier

on:
  schedule:
    - cron: '*/5 7-22 * * *'
  workflow_dispatch:

permissions:
  contents: write   # Nodig om cuescore_state.json terug te committen

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Installeer dependencies
        run: pip install requests

      - name: Voer Cuescore check uit
        env:
          NTFY_TOPIC_BASIS:   ${{ secrets.NTFY_TOPIC_BASIS }}
          NTFY_SERVER:        ${{ secrets.NTFY_SERVER }}
          ORG_STUB:           ${{ secrets.ORG_STUB }}
          EXTRA_TOERNOOI_IDS: ${{ secrets.EXTRA_TOERNOOI_IDS }}
          STATE_PATH:         cuescore_state.json
        run: python cuescore_notifier.py

      - name: Sla state op in repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cuescore_state.json
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push
